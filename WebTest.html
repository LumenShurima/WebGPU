<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebGL2 Image From Binary</title>
  <style>
    html, body { height: 100%; margin: 0; background:#111;}
    #viewport { width: 100%; height: 100%; display: block; }
    .hud { position: fixed; top:8px; left:10px; color:#ddd; font:12px/1.4 system-ui;}
    .hud code { background:#222; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <canvas id="viewport"></canvas>
  <div class="hud">Viewport: <code id="vp"></code> | DPR: <code id="dpr"></code></div>

  <script>
    const canvas = document.getElementById("viewport");
    const gl = canvas.getContext("webgl2", { antialias: true });
    if (!gl) { alert("WebGL2 필요"); throw new Error("No WebGL2"); }

    gl.clearColor(0.08, 0.10, 0.12, 1.0);
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);

    const vpEl  = document.getElementById('vp');
    const dprEl = document.getElementById('dpr');

    function resizeCanvasToDisplaySize() {
      const dpr = window.devicePixelRatio || 1;
      const w = Math.floor(canvas.clientWidth  * dpr);
      const h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      gl.viewport(0, 0, canvas.width, canvas.height);

      gl.useProgram(program);
      gl.uniform2f(uViewportSizeLoc, canvas.width, canvas.height);

      vpEl.textContent  = `${canvas.width}×${canvas.height}`;
      dprEl.textContent = dpr.toFixed(2);
    }

    // --- 셰이더: 풀스크린 사각형 + 텍스처 샘플 ---
    const vsSrc = `#version 300 es
    layout(location = 0) in vec2 aPos;
    layout(location = 1) in vec2 aUV;

    out vec2 vUV;

    uniform mat3 uModel;        // ← 이동/회전/스케일 모두 포함된 행렬
    uniform vec2 uViewportSize;
    uniform vec2 uImageSize;

    void main() {
        float screenAspect = uViewportSize.x / uViewportSize.y;
        float imageAspect  = uImageSize.x   / uImageSize.y;
        
        // 기본 NDC 좌표
        vec3 p = vec3(aPos, 1.0);

        // 🔥 모델 변환 (회전/스케일/이동)
        p = uModel * p;

        // 이미지 종횡비 유지 보정
        if (imageAspect > screenAspect) {
            float scaleY = screenAspect / imageAspect;
            p.y *= scaleY;
        } else {
            float scaleX = imageAspect / screenAspect;
            p.x *= scaleX;
        }

        vUV = aUV;
        gl_Position = vec4(p.xy, 0.0, 1.0);
    }
    `;

    const fsSrc = `#version 300 es
      precision mediump float;

      in vec2 vUV;
      uniform sampler2D uTex;
      out vec4 outColor;

      void main() {
        outColor = texture(uTex, vUV);
      }
    `;

    function compile(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(sh));
      }
      return sh;
    }

    const vs = compile(gl.VERTEX_SHADER, vsSrc);
    const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
    gl.deleteShader(vs);
    gl.deleteShader(fs);

    const uViewportSizeLoc = gl.getUniformLocation(program, "uViewportSize");
    const uImageSizeLoc    = gl.getUniformLocation(program, "uImageSize");
    const uTexLoc          = gl.getUniformLocation(program, "uTex");

    // 화면 전체를 덮는 사각형 (NDC 기준)
    //  (-1, -1) ~ (1, 1)
    const quadVertices = new Float32Array([
      //   x,   y,   u,  v
      -1.0, -1.0,  0.0, 0.0,
       1.0, -1.0,  1.0, 0.0,
      -1.0,  1.0,  0.0, 1.0,
      -1.0,  1.0,  0.0, 1.0,
       1.0, -1.0,  1.0, 0.0,
       1.0,  1.0,  1.0, 1.0,
    ]);

    const vao = gl.createVertexArray();
    const vbo = gl.createBuffer();

    gl.bindVertexArray(vao);
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, quadVertices, gl.STATIC_DRAW);

    const stride = 4 * 4; // float 4개 = 16바이트
    // aPos (location 0)
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, stride, 0);
    // aUV (location 1)
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1, 2, gl.FLOAT, false, stride, 2 * 4);

    gl.bindVertexArray(null);
    gl.bindBuffer(gl.ARRAY_BUFFER, null);

    const bytes = new Uint8Array([
      0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A,0x00,0x00,0x00,0x0D,0x49,0x48,0x44,0x52,
      0x00,0x00,0x00,0x20,0x00,0x00,0x00,0x20,0x08,0x06,0x00,0x00,0x00,0x73,0x7A,0x7A,

      0x69,0x47,0xBB,0x3B,0xB3,0x3B,0xEF,0xF1,0x76,0xC6,0x49,0xD1,0x71,0x9C,0xD2,0x23,
      0x4D,0x04,0xC0,0x7F,0xDC,0xB8,0x8B,0xC0,0x66,0xB3,0xE9,0xEE,0x76,0xBB,0xC1,0x3D,
      0xF4,0xEF,0x22,0x50,0xAF,0xD7,0xC7,0x95,0x4A,0xE5,0xFF,0xC3,0x08,0x9C,0x4E,0x27,
      0x1F,0x9B,0x4A,0x09,0x5B,0x12,0xD6,0x0A,0x48,0xFA,0xE5,0x72,0xF9,0x82,0x4D,0x6D,

      0x71,0xAB,0xD5,0x7A,0x85,0x8C,0xF5,0xB0,0x56,0xE0,0x70,0x38,0x4C,0x65,0x8B,0xC5,
      0xE2,0x9F,0x66,0x5B,0x06,0xD6,0x04,0xA8,0x81,0x67,0x5A,0x30,0x54,0x40,0xEB,0x5F,
      0x25,0xA0,0x0E,0x28,0x16,0x8B,0xD1,0x07,0xC8,0xD5,0xDA,0xB6,0x15,0xAD,0x14,0x48,
      0xFB,0xC5,0x74,0x42,0xDF,0x46,0x85,0x5C,0x04,0x8E,0xC7,0xA3,0xA7,0x5F,0x2D,0x00,
      0xAD,0x99,0x67,0x98,0x39,0x66,0x97,0x98,0x23,0x35,0xA2,0xB5,0x79,0xC8,0xDC,0xE7,
      0x22,0xA0,0x4B,0xAB,0xD5,0x4A,0x5F,0xBD,0x37,0xE4,0xEE,0x93,0x3C,0x41,0x40,0x3E,
      0xC5,0xCE,0xE7,0xF3,0x87,0xCE,0x63,0x71,0x9B,0xB2,0xCE,0x1C,0xB9,0x08,0xF0,0xEB,
      0x7D,0xDA,0xED,0x83,0xD6,0x53,0xBF,0xBB,0x80,0x05,0x66,0xC6,0x8B,0xCF,0xC5,0xEF,
      0xEA,0x6F,0x04,0x73,0x82,0x24,0xBE,0xC4,0xB8,0x49,0x80,0xC4,0x1E,0x09,0xDF,0xAE,
      0x6F,0x52,0x03,0x02,0xBA,0x76,0x99,0x6B,0x15,0xA6,0xA7,0xBB,0x66,0xC0,0xDC,0x7F,
      0x4B,0x80,0x3F,0x34,0x92,0xDC,0x33,0x2E,0x05,0x7A,0x0E,0xF9,0x90,0xDB,0x97,0x69,
      0x7D,0xB1,0x2F,0xCA,0xF0,0x24,0x9E,0x72,0x5C,0x62,0xA9,0x53,0x26,0x01,0x64,0x1F,
      0x20,0x79,0x87,0x04,0x23,0xD9,0x7E,0xBF,0x1F,0xB2,0x2F,0x63,0x4F,0xED,0x76,0x5B,
      0x40,0x01,0xE0,0xA1,0x91,0x39,0x68,0x34,0x1A,0xBE,0x62,0x7C,0x98,0x9E,0xB6,0xDB,

      0x0C,0x90,0x1F,0x81,0x88,0x5C,0xAD,0x56,0xF3,0x74,0x9E,0xBB,0x43,0x54,0xE8,0x29,
      0x17,0x39,0x52,0x47,0x26,0x81,0xEB,0xD3,0x51,0x22,0xF9,0x78,0xD7,0xB1,0x00,0x20,
      0x20,0x15,0xE4,0x0A,0x8D,0x33,0xCF,0x8A,0x69,0x23,0x50,0x99,0xD6,0xB7,0x2C,0x17,
      0x81,0x28,0x09,0x00,0x1E,0x89,0xC3,0xA7,0xC1,0x17,0x2B,0x80,0xFF,0x1D,0x7F,0x17,
      0x1B,0xB0,0x36,0x6B,0x86,0xA3,0xD9,0x23,0x37,0x01,0xC9,0x0E,0x40,0x9C,0x1C,0xC9,

      0x11,0x9B,0xA8,0xF8,0x14,0xE3,0x69,0x66,0x7A,0x8E,0x24,0x54,0xBA,0x27,0x37,0x01,
      0xFE,0xF5,0x7A,0x11,0x30,0xC9,0x55,0x94,0x4E,0x54,0x6C,0xAA,0x87,0xF9,0x7C,0xEE,
      0x6A,0xAF,0x18,0x0A,0xF4,0x98,0x87,0xE9,0x70,0x49,0x6F,0x6E,0x02,0x02,0x30,0xAF,
      0x0B,0x4C,0x96,0x16,0x33,0xCF,0x66,0xED,0x73,0x13,0xC8,0x4A,0x70,0xAF,0xFF,0x8F,
      0xC0,0x9F,0x02,0x3F,0xAE,0xC0,0xAD,0x22,0xFD,0x04,0x00,0x00,0xFF,0xFF,0xE4,0x82,
      0x76,0x0E,0x00,0x00,0x00,0x06,0x49,0x44,0x41,0x54,0x03,0x00,0xF1,0x3C,0x19,0xB0,
      0xF5,0xA8,0x1C,0xCC,0x00,0x00,0x00,0x00,0x49,0x45,0x4E,0x44,0xAE,0x42,0x60,0x82
    ]);

    // --- 텍스처 로드 & 렌더 루프 ---
    let texture = null;

    async function initTextureFromBytes() {
      const blob = new Blob([bytes], { type: "image/png" });
      // 브라우저가 PNG 디코딩
      const imageBitmap = await createImageBitmap(blob);

      // 이미지 크기 유니폼
      gl.useProgram(program);
      gl.uniform2f(uImageSizeLoc, imageBitmap.width, imageBitmap.height);

      // 텍스처 생성/업로드
      texture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imageBitmap);
      gl.bindTexture(gl.TEXTURE_2D, null);
    }

    function render(t) {
      resizeCanvasToDisplaySize();
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      if (!texture) {
        requestAnimationFrame(render);
        return;
      }

      gl.useProgram(program);
      gl.bindVertexArray(vao);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.uniform1i(uTexLoc, 0);

      gl.drawArrays(gl.TRIANGLES, 0, 6);

      gl.bindVertexArray(null);
      requestAnimationFrame(render);
    }

    // 시작
    initTextureFromBytes().then(() => {
      requestAnimationFrame(render);
    });
  </script>
</body>
</html>
